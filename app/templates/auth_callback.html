<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HirePath — Signing in...</title>
    <style>
        :root { --canvas: #F4F1EA; --sage: #2FB4A6; --ink: #2E2A24; --muted: #8C857A; }
        body { font-family: 'Outfit', sans-serif; background: var(--canvas); color: var(--ink); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sage); display: inline-block; animation: pulse 1.2s ease-in-out infinite; }
        .dot:nth-child(2) { animation-delay: .2s; } .dot:nth-child(3) { animation-delay: .4s; }
        @keyframes pulse { 0%,80%,100% { transform: scale(0.7); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div style="text-align:center;">
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px;">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <p style="font-weight:600;font-size:15px;color:var(--muted);">Signing you in…</p>
    </div>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
        const sb = createClient('{{ supabase_url }}', '{{ supabase_anon_key }}')
        
        let redirected = false;
        
        sb.auth.onAuthStateChange(async (event, session) => {
            if (session && !redirected) {
                redirected = true;
                localStorage.setItem('sb_token', session.access_token)
                // Cookie so the server-rendered /dashboard can authenticate this
                // navigation (browser sends no Authorization header on page loads).
                {
                    const _secure = location.protocol === 'https:' ? '; Secure' : '';
                    document.cookie = 'sb_token=' + session.access_token + '; path=/; max-age=3600; SameSite=Lax' + _secure;
                }

                // Bootstrap profile from Google metadata
                const meta = session.user.user_metadata || {}
                const name = meta.full_name || meta.name || '';
                const parts = name.split(' ');
                
                try {
                    await fetch('/api/profile', {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json', 
                            'Authorization': `Bearer ${session.access_token}` 
                        },
                        body: JSON.stringify({ 
                            first_name: parts[0] || '', 
                            last_name: parts.slice(1).join(' ') || '', 
                            email: session.user.email || '' 
                        })
                    });
                } catch(e) {
                    console.error("Error bootstrapping profile:", e);
                }
                
                window.location.href = '/dashboard'
            } else if (event === 'INITIAL_SESSION' && !session && !redirected) {
                // Allow a small delay for URL hash parsing to finish in case it's in progress
                setTimeout(() => {
                    if (!redirected) {
                        window.location.href = '/login'
                    }
                }, 1000);
            }
        })
    </script>
</body>
</html>
