<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HirePath — Sign In</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%234f46e5'/><stop offset='100%25' stop-color='%237c3aed'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><path d='M10 16h12M16 10l6 6-6 6' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/><circle cx='10' cy='16' r='2' fill='rgba(167,139,250,0.9)'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at 50% 0%, #0f172a 0%, #020617 100%); color: #f8fafc; min-height: 100vh; }
        .glass { background: rgba(15,23,42,0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
        input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #1e293b inset !important; -webkit-text-fill-color: #f8fafc !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="text-4xl mb-3">🚀</div>
        <h1 class="text-3xl font-extrabold text-white">HirePath</h1>
        <p class="text-slate-400 text-sm mt-1">AI-powered job application engine</p>
    </div>

    <!-- Card -->
    <div class="glass rounded-[28px] p-8">
        <!-- Tab switcher -->
        <div class="flex bg-slate-900/60 rounded-full p-1 mb-6">
            <button id="tab-signin" onclick="switchTab('signin')" class="flex-1 py-2 rounded-full text-sm font-bold transition text-white bg-indigo-600">Sign In</button>
            <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 py-2 rounded-full text-sm font-bold transition text-slate-400">Sign Up</button>
        </div>

        <!-- Error / success message -->
        <div id="msg" class="hidden mb-4 p-3 rounded-xl text-sm font-medium"></div>

        <!-- Sign In form -->
        <form id="form-signin" onsubmit="handleSignIn(event)" class="space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wide">Email</label>
                <input type="email" id="signin-email" required placeholder="you@example.com"
                    class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" />
            </div>
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wide">Password</label>
                <input type="password" id="signin-password" required placeholder="••••••••"
                    class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" />
            </div>
            <button type="submit" id="btn-signin"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition text-sm mt-2">
                Sign In
            </button>
        </form>

        <!-- Sign Up form -->
        <form id="form-signup" onsubmit="handleSignUp(event)" class="space-y-4 hidden">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wide">First Name</label>
                    <input type="text" id="signup-firstname" required placeholder="Karthik"
                        class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" />
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wide">Last Name</label>
                    <input type="text" id="signup-lastname" required placeholder="Lucky"
                        class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" />
                </div>
            </div>
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wide">Email</label>
                <input type="email" id="signup-email" required placeholder="you@example.com"
                    class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" />
            </div>
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wide">Password</label>
                <input type="password" id="signup-password" required placeholder="Min 8 characters"
                    class="w-full mt-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" />
            </div>
            <button type="submit" id="btn-signup"
                class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition text-sm mt-2">
                Create Account
            </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-5">
            <div class="flex-1 h-px bg-slate-700"></div>
            <span class="text-xs text-slate-500">or</span>
            <div class="flex-1 h-px bg-slate-700"></div>
        </div>

        <!-- Google login -->
        <button onclick="handleGoogle()"
            class="w-full flex items-center justify-center gap-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-bold py-3 rounded-xl transition text-sm">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
        </button>
    </div>

    <p class="text-center text-xs text-slate-600 mt-6">By signing up you agree to our terms of service</p>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const SUPABASE_URL = '{{ supabase_url }}'
    const SUPABASE_ANON_KEY = '{{ supabase_anon_key }}'
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // If already logged in, go straight to dashboard
    const { data: { session } } = await sb.auth.getSession()
    if (session) {
        localStorage.setItem('sb_token', session.access_token)
        window.location.href = '/dashboard'
    }

    function showMsg(text, type = 'error') {
        const el = document.getElementById('msg')
        el.textContent = text
        el.className = `mb-4 p-3 rounded-xl text-sm font-medium ${type === 'error' ? 'bg-red-900/40 text-red-300 border border-red-500/20' : 'bg-emerald-900/40 text-emerald-300 border border-emerald-500/20'}`
        el.classList.remove('hidden')
    }

    window.switchTab = (tab) => {
        document.getElementById('form-signin').classList.toggle('hidden', tab !== 'signin')
        document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup')
        document.getElementById('tab-signin').className = `flex-1 py-2 rounded-full text-sm font-bold transition ${tab === 'signin' ? 'text-white bg-indigo-600' : 'text-slate-400'}`
        document.getElementById('tab-signup').className = `flex-1 py-2 rounded-full text-sm font-bold transition ${tab === 'signup' ? 'text-white bg-indigo-600' : 'text-slate-400'}`
        document.getElementById('msg').classList.add('hidden')
    }

    window.handleSignIn = async (e) => {
        e.preventDefault()
        const btn = document.getElementById('btn-signin')
        btn.textContent = 'Signing in...'; btn.disabled = true
        const { data, error } = await sb.auth.signInWithPassword({
            email: document.getElementById('signin-email').value,
            password: document.getElementById('signin-password').value,
        })
        if (error) { showMsg(error.message); btn.textContent = 'Sign In'; btn.disabled = false; const pwEl = document.getElementById('signin-password'); pwEl.value = ''; pwEl.focus(); return }
        localStorage.setItem('sb_token', data.session.access_token)
        window.location.href = '/dashboard'
    }

    window.handleSignUp = async (e) => {
        e.preventDefault()
        const btn = document.getElementById('btn-signup')
        btn.textContent = 'Creating account...'; btn.disabled = true
        const firstName = document.getElementById('signup-firstname').value
        const lastName = document.getElementById('signup-lastname').value
        const { data, error } = await sb.auth.signUp({
            email: document.getElementById('signup-email').value,
            password: document.getElementById('signup-password').value,
            options: {
                data: { first_name: firstName, last_name: lastName },
                // Pin the confirmation-email redirect to THIS origin so new users
                // never get sent to Supabase's default Site URL (localhost).
                emailRedirectTo: window.location.origin + '/auth/callback'
            }
        })
        if (error) { showMsg(error.message); btn.textContent = 'Create Account'; btn.disabled = false; return }
        if (data.session) {
            localStorage.setItem('sb_token', data.session.access_token)
            // Bootstrap profile with name from signup
            await fetch('/api/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${data.session.access_token}` },
                body: JSON.stringify({ first_name: firstName, last_name: lastName, email: document.getElementById('signup-email').value })
            })
            window.location.href = '/dashboard'
        } else {
            showMsg('Check your email to confirm your account, then sign in.', 'success')
            btn.textContent = 'Create Account'; btn.disabled = false
        }
    }

    window.handleGoogle = async () => {
        await sb.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + '/auth/callback' }
        })
    }
</script>
</body>
</html>
